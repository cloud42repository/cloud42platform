# ── SonarCloud configuration ─────────────────────────────────────────────────
# Docs: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/

# Required – set these via environment variables or here
sonar.organization=YOUR_ORG_KEY
sonar.projectKey=YOUR_PROJECT_KEY

# Display name in SonarCloud
sonar.projectName=cloud42Platform

# ── Sources ──────────────────────────────────────────────────────────────────
sonar.sources=frontend/src,backend/src

# ── Exclusions ───────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/__tests__/**,\
  **/environments/**,\
  **/assets/**,\
  **/*.d.ts

# ── Tests ────────────────────────────────────────────────────────────────────
sonar.tests=backend/src/__tests__
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/__tests__/**

# ── TypeScript / JavaScript ──────────────────────────────────────────────────
sonar.typescript.tsconfigPaths=frontend/tsconfig.json,backend/tsconfig.json
sonar.sourceEncoding=UTF-8

# ── Coverage (if available) ──────────────────────────────────────────────────
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
